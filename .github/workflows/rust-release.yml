name: Rust Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p ruddydoc

      - name: Strip binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            aarch64-linux-gnu-strip target/${{ matrix.target }}/release/ruddydoc
          else
            strip target/${{ matrix.target }}/release/ruddydoc
          fi

      - name: Strip binary (macOS)
        if: matrix.os == 'macos-latest'
        run: strip target/${{ matrix.target }}/release/ruddydoc

      - name: Stage files (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/ruddydoc staging/
          cp LICENSE staging/
          cp README.md staging/

      - name: Stage files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target/${{ matrix.target }}/release/ruddydoc.exe" staging/
          Copy-Item LICENSE staging/
          Copy-Item README.md staging/

      - name: Create checksums (Unix)
        if: runner.os != 'Windows'
        run: |
          cd staging
          sha256sum ruddydoc > ../ruddydoc-${{ github.ref_name }}-${{ matrix.target }}.sha256
          cd ..

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd staging
          tar czf ../ruddydoc-${{ github.ref_name }}-${{ matrix.target }}.tar.gz *
          cd ..
          sha256sum ruddydoc-${{ github.ref_name }}-${{ matrix.target }}.tar.gz >> ruddydoc-${{ github.ref_name }}-${{ matrix.target }}.sha256

      - name: Create checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binaryHash = (Get-FileHash "staging/ruddydoc.exe" -Algorithm SHA256).Hash.ToLower()
          "$binaryHash  ruddydoc.exe" | Out-File -FilePath "ruddydoc-${{ github.ref_name }}-${{ matrix.target }}.sha256" -Encoding ASCII

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path staging/* -DestinationPath "ruddydoc-${{ github.ref_name }}-${{ matrix.target }}.zip"
          $archiveHash = (Get-FileHash "ruddydoc-${{ github.ref_name }}-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$archiveHash  ruddydoc-${{ github.ref_name }}-${{ matrix.target }}.zip" | Out-File -Append -FilePath "ruddydoc-${{ github.ref_name }}-${{ matrix.target }}.sha256" -Encoding ASCII

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ruddydoc-${{ matrix.target }}
          path: |
            ruddydoc-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ github.ref_name }}^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, showing all commits"
            COMMITS=$(git log --pretty=format:"- %s (%h)" ${{ github.ref_name }})
          else
            echo "Generating changelog from $PREV_TAG to ${{ github.ref_name }}"
            COMMITS=$(git log --pretty=format:"- %s (%h)" $PREV_TAG..${{ github.ref_name }})
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "## What's Changed" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ruddydoc-*
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false

  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -e
          # Publish in dependency order (leaf crates first)
          # Each publish waits a bit for crates.io index to update
          for crate in \
            ruddydoc-core \
            ruddydoc-graph \
            ruddydoc-ontology \
            ruddydoc-models \
            ruddydoc-backend-md \
            ruddydoc-backend-html \
            ruddydoc-backend-csv \
            ruddydoc-backend-docx \
            ruddydoc-backend-pdf \
            ruddydoc-backend-latex \
            ruddydoc-backend-pptx \
            ruddydoc-backend-xlsx \
            ruddydoc-backend-image \
            ruddydoc-backend-xml \
            ruddydoc-backend-webvtt \
            ruddydoc-backend-asciidoc \
            ruddydoc-pipeline \
            ruddydoc-export \
            ruddydoc-converter \
            ruddydoc-server \
            ruddydoc; do
            echo "Publishing $crate..."
            cargo publish -p "$crate" --allow-dirty || echo "WARN: $crate publish failed (may already exist)"
            sleep 15
          done
