[build]
incremental = true

[profile.dev]
incremental = true

[profile.release]
lto = true
codegen-units = 1

# Linux-specific optimizations
# Use lld if available, otherwise fall back to default ld
# [target.x86_64-unknown-linux-gnu]
# rustflags = ["-C", "link-arg=-fuse-ld=lld"]
# [target.aarch64-unknown-linux-gnu]
# rustflags = ["-C", "link-arg=-fuse-ld=lld"]
